<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="매니페스트커피">
<meta name="theme-color" content="#3AAEE0">
<title>매니페스트커피 발주 관리</title>
</head>
<body>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
:root{--or:#E8682A;--or2:#C4511A;--orl:#FEF0E8;--orm:#F9C9A8;--sky:#3B8FCC;--sky2:#2472AA;--skyl:#E8F3FB;--skym:#A8D0EF;--sl:#F5F7FA;--ln:#E8ECF0;--rd:#DC2626;--rdl:#FEE2E2}
.hdr{background:linear-gradient(135deg,#2796CC 0%,#3AAEE0 55%,#52C4F0 100%);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:88px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:76px;height:76px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px}
.hdr-title{font-size:14px;font-weight:500;color:#fff;line-height:1.2}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.pbadge{background:var(--or);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;display:none;font-weight:500}
.nav{display:flex;background:var(--color-background-primary);border-bottom:0.5px solid var(--ln);overflow-x:auto}
.nv{padding:12px 16px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;flex-shrink:0}
.nv.on{color:var(--or);border-bottom-color:var(--or);font-weight:500}
.wrap{max-width:720px;margin:0 auto;padding:16px}
.panel{display:none}.panel.on{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--ln);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:14px}
.st{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mcards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--sl);border-radius:var(--border-radius-md);padding:12px 14px;border:0.5px solid var(--ln)}
.ml{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.mv{font-size:22px;font-weight:500}
.mv-or{color:var(--or)}.mv-sky{color:var(--sky)}.mu{font-size:11px;color:var(--color-text-secondary)}
.sinput{width:100%;padding:8px 12px;border:0.5px solid var(--ln);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:10px}
.sinput:focus{outline:none;border-color:var(--or)}
.frow{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fb{padding:5px 13px;font-size:12px;border-radius:20px;border:0.5px solid var(--ln);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
.fb.on{background:var(--or);color:#fff;border-color:var(--or)}
.irow{display:flex;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--ln);gap:10px}
.irow:last-child{border-bottom:none}
/* 카테고리 섹션 헤더 */
.cat-section-hdr{padding:6px 0 4px;font-size:11px;font-weight:500;color:var(--color-text-secondary);display:flex;align-items:center;gap:5px;border-bottom:0.5px solid var(--ln);margin-bottom:2px}
.chk{width:16px;height:16px;accent-color:var(--or);cursor:pointer;flex-shrink:0}
.ii{flex:1;min-width:0}
.in{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.ip{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;display:inline-block;margin-left:4px;vertical-align:middle}
.tg{background:var(--orl);color:#7A2D08}.tb{background:var(--skyl);color:#0C447C}
/* 수량 컨트롤 — +/- 버튼과 같은 높이, 가로 1.5배 너비 */
.qc{display:flex;align-items:center;gap:5px}
.qb{width:26px;height:26px;border-radius:6px;border:0.5px solid var(--ln);background:var(--sl);color:var(--color-text-primary);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qb:hover{background:var(--orl);color:var(--or)}
.qnum-input{width:39px;height:26px;border:0.5px solid var(--orm);border-radius:6px;font-size:13px;font-weight:500;text-align:center;background:var(--orl);color:var(--color-text-primary);padding:0 3px}
.qnum-input:focus{outline:none;border-color:var(--or)}
.qnum-input::-webkit-inner-spin-button,.qnum-input::-webkit-outer-spin-button{-webkit-appearance:none}
.btn{padding:8px 16px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--or);color:#fff}.bp:hover{background:var(--or2)}
.brd{background:var(--rd);color:#fff}
.bs{background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--ln)}.bs:hover{background:var(--sl)}
.brow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.bdg{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;display:inline-flex;align-items:center;gap:3px}
.bgor{background:var(--orl);color:#7A2D08}.bgsk{background:var(--skyl);color:#0C447C}.bgrd{background:var(--rdl);color:#7F1D1D}
.empty{text-align:center;padding:32px 20px;color:var(--color-text-secondary);font-size:13px}
.ocard{border:0.5px solid var(--ln);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:12px;background:var(--color-background-primary)}
.oh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.ot{font-size:13px;font-weight:500}.os{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.pbar-wrap{margin-bottom:10px}
.pbar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.pbar{height:4px;background:var(--sl);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--sky);border-radius:2px;transition:width .3s}.pfill-done{background:var(--or)}
.item-tbl{width:100%;border-collapse:collapse;font-size:12px}
.item-tbl th{background:var(--sl);color:var(--color-text-secondary);font-weight:500;padding:6px 8px;border-bottom:0.5px solid var(--ln);font-size:11px;white-space:nowrap;vertical-align:middle}
.item-tbl td{padding:6px 8px;border-bottom:0.5px solid var(--ln);vertical-align:middle;color:var(--color-text-primary);white-space:nowrap}
.item-tbl tr:last-child td{border-bottom:none}
.item-tbl tr.done-row td{color:var(--color-text-secondary)}
.item-tbl tr.done-row td:first-child{text-decoration:line-through}
.item-tbl tr.cancelled-row td{color:var(--color-text-secondary);background:var(--rdl)}
.item-tbl tr.cancelled-row td:first-child{text-decoration:line-through;color:#9B1C1C}
.rcv-btn{padding:4px 8px;font-size:11px;font-weight:500;border-radius:6px;border:none;cursor:pointer;background:var(--sky);color:#fff}
.rcv-btn:hover{background:var(--sky2)}
.order-btn{padding:4px 8px;font-size:11px;font-weight:500;border-radius:6px;border:none;cursor:pointer;background:var(--or);color:#fff}
.order-btn:hover{background:var(--or2)}
.ordered-lbl{font-size:11px;color:var(--or);font-weight:500}
.cancel-item-btn{padding:4px 8px;font-size:11px;font-weight:500;border-radius:6px;border:0.5px solid var(--rd);cursor:pointer;background:transparent;color:var(--rd)}
.done-lbl{font-size:11px;color:var(--sky);font-weight:500}
.cancelled-lbl{font-size:11px;color:var(--rd);font-weight:500}
.all-done-banner{background:var(--orl);border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;color:#7A2D08;font-weight:500;text-align:center;margin-top:10px;display:none}
.price-input{width:90px;padding:3px 7px;border:0.5px solid var(--orm);border-radius:6px;font-size:12px;background:var(--orl);color:var(--color-text-primary);text-align:center}
.price-input:focus{outline:none;border-color:var(--or)}
.htbl-wrap{overflow-x:auto}
.htbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.htbl th{background:#3AAEE0;color:#fff;font-weight:500;padding:8px 10px;text-align:center;border:0.5px solid rgba(255,255,255,.2);white-space:nowrap;font-size:11px}
.htbl th.nc{text-align:left;width:130px}
.htbl td{padding:7px 10px;border:0.5px solid var(--ln);text-align:center;color:var(--color-text-primary);vertical-align:middle;font-size:12px}
.htbl td.nc{text-align:left;font-weight:500;background:var(--sl)}
.htbl td.z{color:var(--color-text-secondary)}
.htbl tr:nth-child(even) td:not(.nc){background:#FAFCFF}
.item-cost-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.item-cost-tbl th{background:#3AAEE0;color:#fff;font-weight:500;padding:8px 10px;text-align:center;border:0.5px solid rgba(255,255,255,.2);white-space:nowrap;font-size:11px}
.item-cost-tbl th.nc{text-align:left;width:130px}
.item-cost-tbl td{padding:7px 10px;border:0.5px solid var(--ln);text-align:right;color:var(--color-text-primary);vertical-align:middle;font-size:12px}
.item-cost-tbl td.nc{text-align:left;font-weight:500;background:var(--sl)}
.item-cost-tbl td.z{color:var(--color-text-secondary)}
.item-cost-tbl tr:nth-child(even) td:not(.nc){background:#FFF8F5}
.item-cost-tbl tfoot td{background:var(--orl);font-weight:500;color:#7A2D08;border-top:1px solid var(--orm);text-align:right}
.item-cost-tbl tfoot td.nc{text-align:left}
.mo-sel{padding:7px 10px;border:0.5px solid var(--ln);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
.dl-row{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:nowrap}
.dl-btn{padding:5px 10px;font-size:11px;font-weight:500;border-radius:6px;border:0.5px solid var(--ln);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.dl-btn-xl{border-color:#217346;color:#217346}.dl-btn-xl:hover{background:#F0FBF0}
.dl-btn-pdf{border-color:#CC2020;color:#CC2020}.dl-btn-pdf:hover{background:#FFF0F0}
.edit-pill{display:inline-flex;align-items:center;gap:4px;background:var(--skyl);border:0.5px solid var(--skym);border-radius:20px;padding:3px 9px 3px 7px;font-size:10px;color:#0C447C;cursor:pointer}
.edit-pill:hover{background:var(--skym)}
.inline-edit-box{display:none;background:var(--skyl);border:0.5px solid var(--skym);border-radius:var(--border-radius-md);padding:12px;margin-bottom:10px}
.inline-edit-box.open{display:block}
.ie-tbl{width:100%;border-collapse:collapse;font-size:12px}
.ie-tbl th{background:rgba(59,143,204,.15);color:#0C447C;font-weight:500;padding:6px 8px;border-bottom:0.5px solid var(--skym);text-align:left}
.ie-tbl td{padding:5px 8px;border-bottom:0.5px solid var(--skym);vertical-align:middle}
.ie-tbl tr:last-child td{border-bottom:none}
.ie-input{width:70px;padding:3px 6px;border:0.5px solid var(--skym);border-radius:5px;font-size:12px;background:#fff;color:var(--color-text-primary);text-align:center}
.ie-input:focus{outline:none;border-color:var(--sky)}
.detail-outer{margin-bottom:18px}
.detail-month-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.detail-month-title{font-size:14px;font-weight:500}
.month-total-banner{background:linear-gradient(135deg,#2796CC,#52C4F0);border-radius:var(--border-radius-md);padding:10px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.month-total-label{font-size:11px;color:rgba(255,255,255,.6)}
.month-total-amount{font-size:22px;font-weight:500;color:#FAC775}
.month-total-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.detail-order-block{border:0.5px solid var(--ln);border-radius:var(--border-radius-md);margin-bottom:8px;overflow:hidden}
.detail-order-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--sl);border-bottom:0.5px solid var(--ln)}
.detail-order-date{font-size:12px;font-weight:500}
.detail-order-total{font-size:14px;font-weight:500;color:var(--or)}
.detail-item-tbl{width:100%;border-collapse:collapse;font-size:12px}
.detail-item-tbl th{background:rgba(59,143,204,.08);color:#0C447C;font-weight:500;padding:6px 10px;border-bottom:0.5px solid var(--skym);font-size:11px;text-align:left}
.detail-item-tbl th:not(:first-child){text-align:right}
.detail-item-tbl td{padding:6px 10px;border-bottom:0.5px solid var(--ln)}
.detail-item-tbl td:not(:first-child){text-align:right}
.detail-item-tbl tr:last-child td{border-bottom:none}
.detail-item-tbl tr.sub-total-row td{background:var(--orl);font-weight:500;color:#7A2D08}
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:flex-start;justify-content:center;padding-top:80px}
.modal-overlay.on{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:420px;border:none;box-shadow:0 8px 40px rgba(0,0,0,.18);max-height:80vh;overflow-y:auto}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--ln)}
.mtitle{font-size:15px;font-weight:600;color:#2796CC}
.mclose{width:28px;height:28px;border-radius:8px;border:1px solid var(--ln);background:#F5F7FA;color:#555;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.mclose:hover{background:var(--orl);color:var(--or);border-color:var(--orm)}
.rrow{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:0.5px solid var(--ln)}
.rrow:last-child{border-bottom:none}
.confirm-modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:340px;border:none;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.toast-el{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2796CC;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast-el.on{opacity:1}
#app-root{position:relative}
</style>

function td(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fd(s){if(!s)return'';const[y,m,d]=s.split('-');return`${y}년 ${+m}월 ${+d}일`}
function fdS(s){if(!s)return'';const p=s.split('-');return`${+p[1]}월 ${+p[2]}일`}
function mk(s){return(s||td()).slice(0,7)}
function fmk(m){const[y,mo]=m.split('-');return`${y}.${mo}`}
function fmkF(m){const[y,mo]=m.split('-');return`${y}년 ${+mo}월`}
function won(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString()+'원'}
function parsePrice(s){const m=String(s).replace(/,/g,'').match(/\d+/);return m?parseInt(m[0]):0}
function makePrice(price,unit){if(!price&&price!==0)return'미정';const u=unit?'/'+unit:'';return Number(price).toLocaleString()+'원'+u}

function updPrice(oid,idx,val){const o=orders.find(x=>x.id===oid);if(!o)return;const p=parsePrice(val);o.items[idx].unitPrice=p;const master=items.find(x=>x.id===o.items[idx].id);if(master&&p>0)master.unitPrice=p;save()}
async function orderItem(oid,idx){

    o.status=o.items.every(i=>i.cancelled)?'전체취소':'입고완료';o.receiveDate=td();
    if(o.status!=='전체취소'){const m=mk(),md=history.find(h=>h.month===m)||(history.push({month:m,orders:[]}),history[history.length-1]);md.orders.push(JSON.parse(JSON.stringify(o)));}
    save();updateBadge();const ad=document.getElementById('alldone-'+oid);if(ad)ad.style.display='block';
    setTimeout(()=>renderPending(),1200);toast('모든 품목 처리 완료!');return;
  }
  save();
  const tot=o.items.length,rcv=o.items.filter(i=>i.received).length,cnc=o.items.filter(i=>i.cancelled).length,act=tot-rcv-cnc,pct=Math.round(rcv/tot*100);

function getMonths(){
  const range=parseInt((document.getElementById('mo-range')||{}).value||'6');
  const months=[];const now=new Date();
  for(let i=range-1;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}
  return months;
}
function buildData(){
  const months=getMonths();
  const qtyMap={},costMap={};
  history.forEach(mdata=>{mdata.orders.forEach(o=>{o.items.filter(i=>i.received).forEach(item=>{
    if(!qtyMap[item.name])qtyMap[item.name]={cat:item.cat,months:{},lastDate:''};
    if(!costMap[item.name])costMap[item.name]={cat:item.cat,months:{},lastDate:''};
    if(!qtyMap[item.name].months[mdata.month])qtyMap[item.name].months[mdata.month]=0;
    if(!costMap[item.name].months[mdata.month])costMap[item.name].months[mdata.month]=0;
    qtyMap[item.name].months[mdata.month]+=item.qty;
    costMap[item.name].months[mdata.month]+=(item.unitPrice||0)*item.qty;
    const d=item.receiveDate||o.receiveDate||o.date;
    if(d>qtyMap[item.name].lastDate)qtyMap[item.name].lastDate=d;
    if(d>costMap[item.name].lastDate)costMap[item.name].lastDate=d;
  });});});
  const names=Object.keys(qtyMap).sort((a,b)=>(qtyMap[b].lastDate||'').localeCompare(qtyMap[a].lastDate||''));
  return{months,qtyMap,costMap,names};
}
function deleteReceivedItem(monthIdx, orderIdx, itemIdx) {
  if (!confirm('이 입고 기록을 삭제하시겠습니까?')) return;
  const mdata = history[monthIdx];
  if (!mdata) return;
  const order = mdata.orders[orderIdx];
  if (!order) return;
  // received된 항목만 필터링해서 해당 인덱스 찾기
  const receivedItems = order.items.filter(i => i.received);
  const targetItem = receivedItems[itemIdx];
  if (!targetItem) return;
  // 해당 아이템을 history에서 완전 제거
  const origIdx = order.items.indexOf(targetItem);
  order.items.splice(origIdx, 1);
  // 발주의 모든 품목이 없어지면 해당 발주 자체 제거
  if (order.items.length === 0) {
    mdata.orders.splice(orderIdx, 1);
  }
  // 해당 월의 발주가 없어지면 월 자체 제거
  if (mdata.orders.length === 0) {
    history.splice(monthIdx, 1);
  }
  save();
  renderHistory();
  toast('입고 기록이 삭제되었습니다');
}

function addItem(){
  const name=document.getElementById('new-name').value.trim();
  const priceNum=document.getElementById('new-price-num').value.trim();
  const unit=document.getElementById('new-unit').value.trim();
  const cat=document.getElementById('new-cat').value;
  if(!name){toast('품목명을 입력해주세요');return}
  const up=priceNum?parseInt(priceNum)||0:0;
  const priceStr=up>0?makePrice(up,unit):'미정';

function deleteItem(){

function downloadCSV(filename,rows){
  const csv=rows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a)},100);
  toast('CSV 다운로드 완료');
}
function dlCSV(type){
  if(!history.length){toast('다운로드할 데이터가 없습니다');return}
  const{months,qtyMap,costMap,names}=buildData();
  if(type==='qty'){
    const header=['품목명','카테고리',...months.map(m=>fmk(m)),'합계'];
    const rows=names.map(n=>{const d=qtyMap[n];const cells=months.map(m=>d.months[m]||0);return[n,d.cat,...cells,cells.reduce((s,v)=>s+v,0)];});
    downloadCSV('매니페스트커피_품목별월간입고수량.csv',[header,...rows]);
  } else if(type==='detail'){
    const sorted=[...history].sort((a,b)=>b.month.localeCompare(a.month));
    const rows=[];
    sorted.forEach(mdata=>[...mdata.orders].sort((a,b)=>(b.receiveDate||b.date).localeCompare(a.receiveDate||a.date)).forEach(o=>{
      o.items.filter(i=>i.received).forEach(item=>{rows.push([fmkF(mdata.month),fdS(o.receiveDate||o.date),fdS(o.date),item.name,item.cat,item.qty,item.unitPrice||0,(item.unitPrice||0)*item.qty]);});
    }));
    downloadCSV('매니페스트커피_월별발주상세.csv',[['월','입고일','발주일','품목명','카테고리','수량','단가','소계'],...rows]);
  } else if(type==='cost'){
    const header=['품목명','카테고리',...months.map(m=>fmk(m)),'합계'];
    const rows=names.map(n=>{const d=costMap[n];const cells=months.map(m=>d.months[m]||0);return[n,d.cat,...cells,cells.reduce((s,v)=>s+v,0)];});
    const foot=['월 합계','총계',...months.map(m=>names.reduce((s,n)=>s+(costMap[n].months[m]||0),0)),names.reduce((s,n)=>s+months.reduce((ss,m)=>ss+(costMap[n].months[m]||0),0),0)];
    downloadCSV('매니페스트커피_품목별월간구매금액.csv',[header,...rows,foot]);
  }
}

function startRealtime(){
  const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjeWhmYmlocmpxcWN5amxraGZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjY3MzksImV4cCI6MjA5NjU0MjczOX0.oe3nJfqnuD_CqSmG7WgETJ0320RHC_xynqyGMwVdIVQ';

  let ws;

  function connect(){
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      // app_state 테이블 변경 구독
      ws.send(JSON.stringify({
        topic: 'realtime:public:app_state',
        event: 'phx_join',

        ref: '1'
      }));
    };

      const msg = JSON.parse(e.data);
      if(msg.event === 'postgres_changes' || (msg.payload && msg.payload.data && msg.payload.data.type)){
        // 다른 사람이 데이터 변경했을 때 자동으로 다시 로드
        silentReload();
      }
    };

    ws.onclose = () => {
      // 연결 끊기면 3초 후 재연결

    };
  }

  connect();
}
